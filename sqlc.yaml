version: "2"
plugins:
  - name: bulk
    process:
      cmd: ./sqlc-bulk-plugin
sql:
  - schema: testdata/schema.sql
    queries: testdata/query.sql
    engine: postgresql
    gen:
      go:
        package: db
        out: gen
        sql_package: pgx/v5
        emit_interface: true
    codegen:
      - plugin: bulk
        out: gen
        options:
          package: db
